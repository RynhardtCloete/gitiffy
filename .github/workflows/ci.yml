name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Read-only token for every job: none of them publish anything, so a
# compromised dependency build script can't push code or cut releases.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Third-party actions are pinned to commit SHAs (the trailing comment names
# the tag they correspond to) so a hijacked tag can't run code here.
# Dependabot keeps the pins fresh (.github/dependabot.yml).
jobs:
  # Core workspace: build, test, clippy, fmt across all three targets.
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          # Pinned by SHA, the action can't infer the toolchain from its ref.
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # Dedicated lane so the egui fallback backend never rots (spec rec #2). It is
  # excluded from the default workspace, so build it explicitly by path.
  ui-egui:
    name: ui-egui (fallback) builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install egui system deps
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: build egui backend
        run: cargo build --manifest-path crates/gg-ui-egui/Cargo.toml

  # Licensing gate for the GPUI path (Apache-2.0 vs alleged transitive GPL-3.0).
  deny:
    name: cargo-deny (licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
