# cargo-deny configuration.
#
# The licensing check is the one the spec flags as legal-sensitive: GPUI's
# Apache-2.0 promise underpins distributing gittify under any license, but a
# community report alleges a transitive GPL-3.0 link (sum_tree -> ztracing ->
# zlog). This config denies copyleft licenses so that risk surfaces in CI the
# moment the GPUI git dependency is added, rather than after release.

# Only audit the platforms gittify actually ships on. Without this,
# cargo-deny walks the lockfile for every possible target, dragging in e.g.
# muda's Linux GTK3 bindings (unmaintained-advisory noise) even though muda is
# a macOS-only dependency here and the GTK path is never compiled.
[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]

[licenses]
allow = [
    # The project's own license (workspace crates only; dependencies stay
    # under the permissive licenses below).
    "PolyForm-Noncommercial-1.0.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    # Embedded default fonts in epaint (egui stack).
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[advisories]
yanked = "deny"
ignore = [
    # DoS-class issues in quick-xml 0.39 (quadratic attribute checking, unbounded
    # namespace allocation). Pulled in via eframe -> atspi -> zbus, which pins
    # quick-xml 0.39; the fix (>= 0.41) lands when the egui stack bumps zbus.
    # Only parses local D-Bus introspection XML on Linux, so exposure is minimal.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # ttf-parser is unmaintained (informational). Transitive via the egui font
    # stack; revisit when egui migrates off it.
    "RUSTSEC-2026-0192",
    # Unmaintained gtk-rs GTK3 bindings (and their proc-macro-error helper).
    # These are muda's *Linux* dependencies; we depend on muda only on macOS
    # (native menu bar), so this code is never compiled on any platform we
    # ship. cargo-deny still walks the edges because it evaluates muda's
    # target cfgs against every triple in [graph].targets. Drop these when
    # muda moves its Linux backend off GTK3.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
]

[sources]
unknown-registry = "deny"
unknown-git = "allow" # GPUI is pinned via a Zed git dependency.
